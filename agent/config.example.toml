interval_seconds = 30
log_lines = 80

[host]
id = "mac-mini"
name = "Mac Mini"
# darwin / linux; 不填时自动识别
platform = "darwin"

[server]
url = "https://monitor.example.com"
token = "change-me"
timeout = 8

[collectors]
systemd = true
launchd = true
docker = true

[[processes]]
name = "my-nohup-app"
display_name = "我的裸进程"
pattern = "python.*my_app.py"
log_paths = ["/var/log/my_app.log"]
working_dir = "/opt/my_app"

[frp]
enabled = false
# ECS 上运行 frps 时可开启。默认从 systemd 的 frps.service ExecStart 自动发现配置。
service_name = "frps.service"
# 若不想自动发现,也可手动填写:
# admin_url = "http://127.0.0.1:7500"
# username = "admin"
# password = "admin"
